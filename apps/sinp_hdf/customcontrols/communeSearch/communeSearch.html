<a
  id="btn-filters"
  onclick="window.reactComponentManager.openFilterModal({
    activeLayerId: 'communeSearch',
    onSubmit: (params) => {
      if (window.mviewer?.customControls?.communeSearch) {
        mviewer.customControls.communeSearch.submit(params);
      }
    }
  });"
  title="Afficher les filtres de recherche"
  i18n="filters.open"
  href="#">
  <span class="glyphicon glyphicon-search"></span>
  Lancer une recherche avancee
</a>
